name: Meme Rush Data Fetcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Topic Rush Data
        run: |
          node << 'EOF'
          const https = require('https');
          const zlib = require('zlib');
          const fs = require('fs');
          
          // Topic Rush API - 热点话题
          const API_URL = 'https://web3.binance.com/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/social-rush/rank/list';
          
          const categories = {
            'latest': 10,
            'rising': 20,
            'viral': 30
          };
          
          const chains = {
            'bsc': '56',
            'solana': 'CT_501'
          };
          
          async function fetchData(chainId, rankType) {
            return new Promise((resolve, reject) => {
              const url = `${API_URL}?chainId=${chainId}&rankType=${rankType}&sort=10&asc=false`;
              
              const options = {
                hostname: 'web3.binance.com',
                port: 443,
                path: `/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/social-rush/rank/list?chainId=${chainId}&rankType=${rankType}&sort=10&asc=false`,
                method: 'GET',
                headers: {
                  'Accept': 'application/json',
                  'Accept-Encoding': 'gzip, deflate'
                }
              };
              
              const req = https.request(options, (res) => {
                const chunks = [];
                
                if (res.headers['content-encoding'] === 'gzip') {
                  const gunzip = zlib.createGunzip();
                  res.pipe(gunzip);
                  
                  gunzip.on('data', chunk => chunks.push(chunk));
                  gunzip.on('end', () => {
                    try {
                      const result = JSON.parse(Buffer.concat(chunks).toString());
                      if (result.code === '000000' && result.data) {
                        resolve(result.data.rank || []);
                      } else {
                        resolve([]);
                      }
                    } catch (e) {
                      reject(new Error('JSON 解析失败：' + e.message));
                    }
                  });
                  gunzip.on('error', reject);
                } else {
                  res.on('data', chunk => chunks.push(chunk));
                  res.on('end', () => {
                    try {
                      const result = JSON.parse(Buffer.concat(chunks).toString());
                      if (result.code === '000000' && result.data) {
                        resolve(result.data.rank || []);
                      } else {
                        resolve([]);
                      }
                    } catch (e) {
                      reject(new Error('JSON 解析失败：' + e.message));
                    }
                  });
                }
              });
              
              req.on('error', reject);
              req.end();
            });
          }
          
          async function main() {
            const allData = {};
            
            for (const [chainName, chainId] of Object.entries(chains)) {
              allData[chainName] = {};
              for (const [categoryName, rankType] of Object.entries(categories)) {
                console.log(`Fetching ${chainName} - ${categoryName}...`);
                try {
                  const data = await fetchData(chainId, rankType);
                  allData[chainName][categoryName] = {
                    data: data,
                    count: data.length,
                    timestamp: new Date().toISOString()
                  };
                  console.log(`  ✅ Got ${data.length} topics`);
                } catch (error) {
                  console.error(`  ❌ Error: ${error.message}`);
                  allData[chainName][categoryName] = {
                    data: [],
                    error: error.message,
                    timestamp: new Date().toISOString()
                  };
                }
              }
            }
            
            fs.writeFileSync('meme-rush-data.json', JSON.stringify(allData, null, 2));
            console.log('\n✅ Data saved to meme-rush-data.json');
            
            const summary = {
              timestamp: new Date().toISOString(),
              chains: {},
              total: 0
            };
            
            for (const [chainName, categories] of Object.entries(allData)) {
              summary.chains[chainName] = {};
              for (const [catName, catData] of Object.entries(categories)) {
                summary.chains[chainName][catName] = catData.count || 0;
                summary.total += catData.count || 0;
              }
            }
            
            console.log('\n📊 Summary:');
            console.log(JSON.stringify(summary, null, 2));
          }
          
          main().catch(console.error);
          EOF
      
      - name: Commit and Push Data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add meme-rush-data.json
          git diff --staged --quiet || git commit -m "📊 Auto-update Topic Rush data $(date '+%Y-%m-%d %H:%M')"
          git push
