<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Meme Rush 热点监控 - 财神爷养成日记</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css?v=202603061120">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #2a0000 100%);
            min-height: 100vh;
            color: #ffd700;
            padding: 10px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        .mascot { font-size: 3em; margin-bottom: 5px; }
        header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .subtitle { font-size: 0.9em; color: #ffaa00; }
        .status {
            display: inline-block;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        .data-info {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 8px 15px;
            margin-bottom: 10px;
            text-align: center;
            color: #ffaa00;
            font-size: 0.85em;
        }
        
        .chain-selector, .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .chain-btn, .category-tab {
            padding: 6px 15px;
            background: rgba(139, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            color: #ffaa00;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .chain-btn:hover, .category-tab:hover { transform: translateY(-2px); }
        .chain-btn.active, .category-tab.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
            color: #ffd700;
        }
        
        /* 网格布局 - 紧凑显示 */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 10px;
        }
        
        .topic-card {
            background: linear-gradient(135deg, rgba(74, 0, 0, 0.9), rgba(26, 0, 0, 0.95));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.85em;
        }
        
        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 10px;
        }
        .topic-title {
            flex: 1;
            font-weight: 600;
            color: #ffd700;
            font-size: 0.95em;
            line-height: 1.3;
        }
        .topic-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            background: rgba(255, 215, 0, 0.15);
            color: #ffaa00;
            border: 1px solid rgba(255, 215, 0, 0.2);
            white-space: nowrap;
        }
        
        .topic-type {
            color: #888;
            font-size: 0.75em;
            margin-bottom: 6px;
        }
        
        .topic-summary {
            background: rgba(255, 215, 0, 0.05);
            border-left: 2px solid #ffd700;
            padding: 6px 8px;
            margin-bottom: 8px;
            border-radius: 0 4px 4px 0;
            font-size: 0.8em;
            color: #ffaa00;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
        }
        
        .token-list {
            margin-top: 8px;
        }
        .token-list h4 {
            color: #ffd700;
            font-size: 0.8em;
            margin-bottom: 6px;
        }
        .token-item {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 6px;
            padding: 6px 8px;
            margin-bottom: 5px;
            font-size: 0.85em;
        }
        .token-symbol {
            color: #ffd700;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 4px;
        }
        .token-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            font-size: 0.85em;
        }
        .token-stat { text-align: center; }
        .token-stat-label { color: #666; font-size: 0.8em; }
        .token-stat-value { color: #ffd700; font-weight: 600; font-size: 0.9em; }
        
        .meme-contract {
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7em;
            color: #666;
            cursor: pointer;
            word-break: break-all;
            margin-top: 4px;
            text-align: center;
        }
        .meme-contract:hover { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        
        .topic-link {
            display: inline-block;
            color: #ffd700;
            text-decoration: none;
            font-size: 0.75em;
            margin-top: 6px;
            padding: 3px 8px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 4px;
        }
        
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.75em;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
        
        .loading-container, .error-container, .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .topics-grid { grid-template-columns: 1fr; }
            .token-stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="mascot">🚀</div>
            <h1>Meme Rush 热点监控</h1>
            <p class="subtitle">Binance Web3 Topic Rush - 热点话题追踪</p>
            <span class="status">🟢 实时监控中</span>
        </header>

        <div class="data-info" id="data-info">📊 加载中...</div>

        <div class="chain-selector">
            <button class="chain-btn active" data-chain="bsc">🟡 BSC</button>
            <button class="chain-btn" data-chain="solana">🟣 Solana</button>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-category="latest">🔥 最新</button>
            <button class="category-tab" data-category="rising">📈 上升</button>
            <button class="category-tab" data-category="viral">🚀 病毒</button>
        </div>

        <div id="meme-container">
            <div class="loading-container"><p>🔄 正在加载数据...</p></div>
        </div>

        <div class="last-update" id="last-update"></div>
    </div>

    <script>
        let memeData = {};
        let currentChain = 'bsc';
        let currentCategory = 'latest';
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadMemeData();
            setupChainSelector();
            setupCategoryTabs();
            renderMemeRush();
        });
        
        async function loadMemeData() {
            // 配置 API 地址（优先本地，回退GitHub）
            const LOCAL_API = 'http://localhost:3456/api/meme-rush';
            const GITHUB_URL = 'https://raw.githubusercontent.com/jianjun156/caishenye/main/meme-rush-data.json';
            
            // 本地 API 数据源
            let useLocalSource = false;
            
            try {
                // 尝试本地 API
                const localResponse = await fetch(LOCAL_API + '?t=' + Date.now(), { 
                    signal: AbortSignal.timeout(5000) // 5秒超时
                });
                if (localResponse.ok) {
                    const localJson = await localResponse.json();
                    if (localJson.success && localJson.data) {
                        memeData = localJson.data;
                        useLocalSource = true;
                        console.log('[MemeRush] 使用本地API数据');
                    }
                }
            } catch (error) {
                console.log('[MemeRush] 本地API不可用，使用GitHub数据:', error.message);
            }
            
            // 回退到 GitHub 数据
            if (!useLocalSource) {
                try {
                    const githubResponse = await fetch(GITHUB_URL + '?t=' + Date.now());
                    if (!githubResponse.ok) throw new Error('GitHub数据不存在');
                    memeData = await githubResponse.json();
                    console.log('[MemeRush] 使用GitHub静态数据');
                } catch (error) {
                    document.getElementById('meme-container').innerHTML = `
                        <div class="error-container">
                            <h3>⚠️ 数据加载失败</h3>
                            <p>本地: 连接超时 | GitHub: ${error.message}</p>
                            <button class="chain-btn" onclick="location.reload()" style="margin-top:10px;">🔄 刷新</button>
                        </div>`;
                    return;
                }
            }
            
            updateDataInfo(useLocalSource);
        }
        
        function updateDataInfo(useLocal = false) {
            const chainData = memeData[currentChain];
            if (!chainData) return;
            const total = Object.values(chainData).reduce((sum, cat) => sum + (cat.count || 0), 0);
            const timestamp = chainData.latest?.timestamp || '';
            const source = useLocal ? '🔴 本地实时' : '🟡 GitHub静态';
            document.getElementById('data-info').textContent = `📊 共 ${total} 个热点 | ${source}`;
            document.getElementById('last-update').textContent = `最后更新：${new Date(timestamp).toLocaleString('zh-CN')} ${useLocal ? '(实时)' : '(每15分钟)'}`;
        }
        
        function setupChainSelector() {
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    updateDataInfo();
                    renderMemeRush();
                });
            });
        }
        
        function setupCategoryTabs() {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderMemeRush();
                });
            });
        }
        
        function renderMemeRush() {
            const container = document.getElementById('meme-container');
            const categoryNames = {latest: '🔥 最新', rising: '📈 上升', viral: '🚀 病毒'};
            const chainData = memeData[currentChain];
            
            if (!chainData) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            const categoryData = chainData[currentCategory];
            const topics = categoryData?.data || [];
            
            if (!topics || topics.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            container.innerHTML = `<div class="topics-grid">${topics.map(topic => {
                const name = topic.name?.topicNameCn || topic.name?.topicNameEn || '未知';
                const netInflow = parseFloat(topic.topicNetInflow || 0);
                const tokenCount = topic.tokenSize || 0;
                const progress = parseFloat(topic.progress || 0);
                const type = topic.type || '';
                const tokens = topic.tokenList || [];
                
                return `
                    <div class="topic-card">
                        <div class="topic-header">
                            <div class="topic-title">${name}</div>
                            <div class="topic-badges">
                                <span class="badge">💰 $${(netInflow/1000).toFixed(1)}K</span>
                                <span class="badge">📈 ${progress.toFixed(0)}%</span>
                            </div>
                        </div>
                        <div class="topic-type">📊 ${type} · 🔥 ${tokenCount}代币</div>
                        ${topic.aiSummary?.aiSummaryCn ? `<div class="topic-summary">🤖 ${topic.aiSummary.aiSummaryCn.substring(0, 100)}${topic.aiSummary.aiSummaryCn.length > 100 ? '...' : ''}</div>` : ''}
                        ${tokens.length > 0 ? `
                            <div class="token-list">
                                <h4>🏷️ 关联代币</h4>
                                ${tokens.slice(0, 3).map(token => `
                                    <div class="token-item">
                                        <div class="token-symbol">${token.symbol}</div>
                                        <div class="token-stats">
                                            <div class="token-stat"><div class="token-stat-label">市值</div><div class="token-stat-value">$${(parseFloat(token.marketCap||0)/1000).toFixed(1)}K</div></div>
                                            <div class="token-stat"><div class="token-stat-label">流动性</div><div class="token-stat-value">$${(parseFloat(token.liquidity||0)/1000).toFixed(1)}K</div></div>
                                            <div class="token-stat"><div class="token-stat-label">24h</div><div class="token-stat-value" style="color:${parseFloat(token.priceChange24h||0)>=0?'#2ecc71':'#e74c3c'}">${parseFloat(token.priceChange24h||0)>=0?'+':''}${parseFloat(token.priceChange24h||0).toFixed(1)}%</div></div>
                                            <div class="token-stat"><div class="token-stat-label">持有者</div><div class="token-stat-value">${token.holders||0}</div></div>
                                        </div>
                                        <div class="meme-contract" onclick="navigator.clipboard.writeText('${token.contractAddress}');this.textContent='✅已复制';setTimeout(()=>this.textContent='📋 '+this.dataset.addr,1500);" data-addr="${token.contractAddress}">📋${token.contractAddress.substring(0,20)}...${token.contractAddress.substring(token.contractAddress.length-8)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        ${topic.topicLink ? `<a href="${topic.topicLink}" target="_blank" class="topic-link">🔗 原文</a>` : ''}
                    </div>
                `;
            }).join('')}</div>`;
        }
    </script>
</body>
</html>
