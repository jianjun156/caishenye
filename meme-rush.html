<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Meme Rush 热点监控 - 财神爷养成日记</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css?v=202603061300">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #2a0000 100%);
            min-height: 100vh;
            color: #ffd700;
            padding: 10px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header { text-align: center; padding: 10px 0; margin-bottom: 10px; }
        .mascot { font-size: 2.5em; margin-bottom: 5px; }
        header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .subtitle { font-size: 0.85em; color: #ffaa00; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .data-info { color: #ffaa00; font-size: 0.9em; }
        .countdown { color: #2ecc71; font-size: 0.9em; font-weight: 600; }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .chain-selector, .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .chain-btn, .category-tab {
            padding: 6px 14px;
            background: rgba(139, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            color: #ffaa00;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .chain-btn:hover, .category-tab:hover { transform: translateY(-2px); }
        .chain-btn.active, .category-tab.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
            color: #ffd700;
        }
        
        /* 排序按钮 */
        .sort-controls { display: flex; gap: 8px; align-items: center; }
        .sort-controls span { color: #888; font-size: 0.8em; }
        .sort-btn {
            padding: 5px 10px;
            background: rgba(139, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            color: #ffaa00;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.2s;
        }
        .sort-btn:hover { background: rgba(255, 215, 0, 0.1); }
        .sort-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }
        
        /* 列表头部 */
        .token-table-header {
            display: grid;
            grid-template-columns: 80px 1fr 100px 100px 100px 100px 100px 60px;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 8px 8px 0 0;
            font-size: 0.75em;
            font-weight: 600;
            color: #ffaa00;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        /* 列表内容 */
        .token-table {
            background: rgba(74, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .token-row {
            display: grid;
            grid-template-columns: 80px 1fr 100px 100px 100px 100px 100px 60px;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            align-items: center;
            font-size: 0.8em;
            transition: background 0.2s;
        }
        .token-row:hover { background: rgba(255, 215, 0, 0.08); }
        .token-row:last-child { border-bottom: none; }
        
        .token-rank { color: #888; text-align: center; }
        .token-rank.top3 { color: #ffd700; font-weight: 700; font-size: 1em; }
        
        .token-info { min-width: 0; }
        .token-name { color: #ffd700; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .token-symbol { color: #888; font-size: 0.85em; margin-top: 2px; }
        
        .token-stat { text-align: right; font-weight: 600; }
        .token-stat.green { color: #2ecc71; }
        .token-stat.red { color: #e74c3c; }
        
        .token-ca {
            font-family: monospace;
            font-size: 0.7em;
            color: #666;
            cursor: pointer;
            padding: 2px 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        .token-ca:hover { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        
        .token-link a {
            color: #ffd700;
            text-decoration: none;
            font-size: 0.85em;
        }
        .token-link a:hover { text-decoration: underline; }
        
        /* 分类标题 */
        .section-title {
            color: #ffd700;
            font-size: 0.9em;
            padding: 10px 12px;
            background: rgba(139, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .loading-container, .error-container, .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        @media (max-width: 900px) {
            .token-table-header, .token-row {
                grid-template-columns: 50px 1fr 80px 80px 80px 50px;
            }
            .token-ca, .token-link { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="mascot">🚀</div>
            <h1>Meme Rush 热点监控</h1>
            <p class="subtitle">Binance Web3 Topic Rush - 热点话题追踪</p>
        </header>

        <div class="status-bar">
            <div class="data-info" id="data-info">📊 加载中...</div>
            <div class="countdown" id="countdown">🔄 下次更新: 60秒</div>
        </div>

        <div class="controls">
            <div>
                <div class="chain-selector" style="margin-bottom: 8px;">
                    <button class="chain-btn active" data-chain="bsc">🟡 BSC</button>
                    <button class="chain-btn" data-chain="solana">🟣 Solana</button>
                </div>
                <div class="category-tabs">
                    <button class="category-tab active" data-category="latest">🔥 最新</button>
                    <button class="category-tab" data-category="rising">📈 上升</button>
                    <button class="category-tab" data-category="viral">🚀 病毒</button>
                </div>
            </div>
            <div class="sort-controls">
                <span>排序:</span>
                <button class="sort-btn active" data-sort="netInflow">净流入</button>
                <button class="sort-btn" data-sort="marketCap">市值</button>
                <button class="sort-btn" data-sort="liquidity">流动性</button>
                <button class="sort-btn" data-sort="holders">持有者</button>
                <button class="sort-btn" data-sort="priceChange24h">24h涨幅</button>
            </div>
        </div>

        <div id="meme-container">
            <div class="loading-container"><p>🔄 正在加载数据...</p></div>
        </div>
    </div>

    <script>
        let memeData = {};
        let currentChain = 'bsc';
        let currentCategory = 'latest';
        let currentSort = 'netInflow';
        let countdownSeconds = 60;
        let countdownTimer = null;
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            if (!num || isNaN(num)) return '-';
            const n = parseFloat(num);
            if (n >= 1e9) return (n / 1e9).toFixed(decimals) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(decimals) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(decimals) + 'K';
            return n.toFixed(decimals);
        }
        
        // 复制合约地址
        function copyCA(addr, btn) {
            navigator.clipboard.writeText(addr);
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋', 1000);
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadMemeData();
            setupControls();
            renderMemeRush();
            startCountdown();
        });
        
        async function loadMemeData() {
            const LOCAL_API = 'https://clawapi.weisgj.com/api/meme-rush';
            let useLocal = false;
            
            try {
                const res = await fetch(LOCAL_API + '?t=' + Date.now(), { 
                    signal: AbortSignal.timeout(10000) 
                });
                if (res.ok) {
                    const json = await res.json();
                    if (json.success && json.data) {
                        memeData = json.data;
                        useLocal = true;
                    }
                }
            } catch (e) {
                console.log('本地API失败:', e.message);
            }
            
            if (!useLocal) {
                try {
                    const res = await fetch('https://raw.githubusercontent.com/jianjun156/caishenye/main/meme-rush-data.json?t=' + Date.now());
                    if (res.ok) memeData = await res.json();
                } catch (e) {
                    document.getElementById('meme-container').innerHTML = '<div class="error-container"><h3>⚠️ 数据加载失败</h3></div>';
                    return;
                }
            }
            
            updateDataInfo(useLocal);
        }
        
        function updateDataInfo(useLocal) {
            const chainData = memeData[currentChain];
            if (!chainData) return;
            const total = Object.values(chainData).reduce((sum, cat) => sum + (cat.count || 0), 0);
            const timestamp = chainData.latest?.timestamp || '';
            const source = useLocal ? '🔴 实时' : '🟡 静态';
            document.getElementById('data-info').textContent = `📊 ${total}个热点 | ${source} | ${new Date(timestamp).toLocaleTimeString('zh-CN')}`;
        }
        
        function setupControls() {
            // 链选择
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    updateDataInfo();
                    renderMemeRush();
                });
            });
            
            // 分类选择
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderMemeRush();
                });
            });
            
            // 排序
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSort = btn.dataset.sort;
                    renderMemeRush();
                });
            });
        }
        
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownSeconds = 60;
            countdownTimer = setInterval(() => {
                countdownSeconds--;
                document.getElementById('countdown').textContent = `🔄 下次更新: ${countdownSeconds}秒`;
                if (countdownSeconds <= 0) {
                    countdownSeconds = 60;
                    loadMemeData().then(() => renderMemeRush());
                }
            }, 1000);
        }
        
        function renderMemeRush() {
            const container = document.getElementById('meme-container');
            const chainData = memeData[currentChain];
            
            if (!chainData) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            const categoryData = chainData[currentCategory];
            let topics = categoryData?.data || [];
            
            if (!topics || topics.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            // 收集所有代币并排序
            let allTokens = [];
            topics.forEach((topic, topicIdx) => {
                const topicName = topic.name?.topicNameCn || topic.name?.topicNameEn || '未知';
                (topic.tokenList || []).forEach(token => {
                    allTokens.push({
                        ...token,
                        topicName,
                        topicIdx,
                        netInflow: parseFloat(topic.topicNetInflow || 0) + parseFloat(token.netInflow || 0)
                    });
                });
            });
            
            // 排序
            allTokens.sort((a, b) => {
                const aVal = parseFloat(a[currentSort] || 0);
                const bVal = parseFloat(b[currentSort] || 0);
                return bVal - aVal;
            });
            
            // 渲染表格
            let html = `
                <div class="token-table-header">
                    <div>#</div>
                    <div>代币</div>
                    <div style="text-align:right">净流入</div>
                    <div style="text-align:right">市值</div>
                    <div style="text-align:right">流动性</div>
                    <div style="text-align:right">24h</div>
                    <div style="text-align:right">持有者</div>
                    <div>CA</div>
                </div>
                <div class="token-table">
            `;
            
            allTokens.slice(0, 50).forEach((token, idx) => {
                const rank = idx + 1;
                const priceChange = parseFloat(token.priceChange24h || 0);
                const changeClass = priceChange >= 0 ? 'green' : 'red';
                const changePrefix = priceChange >= 0 ? '+' : '';
                
                html += `
                    <div class="token-row">
                        <div class="token-rank ${rank <= 3 ? 'top3' : ''}">${rank}</div>
                        <div class="token-info">
                            <div class="token-name">${token.symbol}</div>
                            <div class="token-symbol">${token.topicName.substring(0, 30)}</div>
                        </div>
                        <div class="token-stat">$${formatNumber(token.netInflow)}</div>
                        <div class="token-stat">$${formatNumber(token.marketCap)}</div>
                        <div class="token-stat">$${formatNumber(token.liquidity)}</div>
                        <div class="token-stat ${changeClass}">${changePrefix}${priceChange.toFixed(1)}%</div>
                        <div class="token-stat">${token.holders || 0}</div>
                        <div class="token-ca" onclick="copyCA('${token.contractAddress}', this)">📋</div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
