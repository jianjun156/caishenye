<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Meme Rush 热点监控 - 财神爷养成日记</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css?v=202603051715">
    <style>
        .chain-selector, .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .chain-btn, .category-tab {
            padding: 10px 20px;
            background: rgba(139, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            color: #ffaa00;
            cursor: pointer;
            font-weight: 600;
        }
        .chain-btn.active, .category-tab.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
            color: #ffd700;
        }
        .loading-container { text-align: center; padding: 60px 20px; }
        .error-container { text-align: center; padding: 60px 20px; color: #e74c3c; }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 25px;
            color: #1a0000;
            font-weight: 600;
            cursor: pointer;
        }
        .hotspot-card {
            background: linear-gradient(135deg, rgba(74, 0, 0, 0.8), rgba(26, 0, 0, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .token-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .token-stat {
            background: rgba(255, 215, 0, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        .token-stat-label { font-size: 0.75em; color: #888; }
        .token-stat-value { font-size: 0.95em; color: #ffd700; font-weight: 600; }
        .meme-contract {
            background: rgba(0,0,0,0.3);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8em;
            color: #888;
            cursor: pointer;
            word-break: break-all;
        }
        .meme-contract:hover { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        .last-update { text-align: center; color: #888; margin-top: 30px; }
        .data-info {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffaa00;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="mascot">🚀</div>
            <h1>Meme Rush 热点监控</h1>
            <p class="subtitle">GitHub Actions 定时抓取 · 每 15 分钟更新</p>
            <span class="status">🟢 数据已更新</span>
        </header>

        <div class="data-info" id="data-info">
            📊 加载中...
        </div>

        <div class="chain-selector">
            <button class="chain-btn active" data-chain="bsc">🟡 BSC</button>
            <button class="chain-btn" data-chain="solana">🟣 Solana</button>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-category="latest">🔥 最新</button>
            <button class="category-tab" data-category="rising">📈 上升</button>
            <button class="category-tab" data-category="migrated">🚀 病毒</button>
        </div>

        <div id="meme-container">
            <div class="loading-container">
                <p>🔄 正在加载数据...</p>
            </div>
        </div>

        <div class="last-update" id="last-update"></div>

        <footer>
            <p><a href="index.html">🏠 返回首页</a> | <a href="https://github.com/jianjun156/caishenye" target="_blank">📁 GitHub</a></p>
        </footer>
    </div>

    <script>
        let memeData = {};
        let currentChain = 'bsc';
        let currentCategory = 'latest';
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadMemeData();
            setupChainSelector();
            setupCategoryTabs();
            renderMemeRush();
        });
        
        // 加载数据
        async function loadMemeData() {
            try {
                const response = await fetch('./meme-rush-data.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据文件不存在');
                memeData = await response.json();
                
                updateDataInfo();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('meme-container').innerHTML = `
                    <div class="error-container">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>${error.message}</p>
                        <p>可能是第一次运行，等待 GitHub Actions 抓取数据</p>
                        <button class="retry-btn" onclick="location.reload()">🔄 刷新</button>
                    </div>
                `;
            }
        }
        
        // 更新数据信息
        function updateDataInfo() {
            const chainData = memeData[currentChain];
            if (!chainData) return;
            
            const total = Object.values(chainData).reduce((sum, cat) => sum + (cat.count || 0), 0);
            const timestamp = chainData.latest?.timestamp || '';
            
            document.getElementById('data-info').textContent = 
                `📊 共 ${total} 个代币 | 最后更新：${new Date(timestamp).toLocaleString('zh-CN')}`;
            
            document.getElementById('last-update').textContent = 
                `数据更新时间：${new Date(timestamp).toLocaleString('zh-CN')} (每 15 分钟自动更新)`;
        }
        
        function setupChainSelector() {
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    updateDataInfo();
                    renderMemeRush();
                });
            });
        }
        
        function setupCategoryTabs() {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderMemeRush();
                });
            });
        }
        
        function renderMemeRush() {
            const container = document.getElementById('meme-container');
            const categoryNames = {latest: '🔥 最新', rising: '📈 上升', migrated: '🚀 病毒'};
            const protocolNames = {2001: 'Four.meme', 2002: 'Flap', 1001: 'Pump.fun', 1010: 'Moonshot'};
            
            const chainData = memeData[currentChain];
            if (!chainData) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            const categoryData = chainData[currentCategory];
            const tokens = categoryData?.data || [];
            
            if (!tokens || tokens.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3><p>该类目下暂时没有 Meme 代币</p></div>';
                return;
            }
            
            container.innerHTML = tokens.map((token, i) => `
                <div class="hotspot-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                        <h3 style="color:#ffd700;margin:0;">${categoryNames[currentCategory]} - ${token.symbol || 'Unknown'}</h3>
                        <span style="background:rgba(255,215,0,0.2);padding:5px 12px;border-radius:15px;color:#ffaa00;">
                            ${protocolNames[token.protocol] || 'Unknown'}
                        </span>
                    </div>
                    <div class="token-stats">
                        <div class="token-stat">
                            <div class="token-stat-label">市值</div>
                            <div class="token-stat-value">$${(parseFloat(token.marketCap||0)/1000).toFixed(2)}K</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">流动性</div>
                            <div class="token-stat-value">$${(parseFloat(token.liquidity||0)/1000).toFixed(2)}K</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">成交量</div>
                            <div class="token-stat-value">$${(parseFloat(token.volume||0)/1000).toFixed(2)}K</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">持有者</div>
                            <div class="token-stat-value">👥 ${token.holders||0}</div>
                        </div>
                        <div class="token-stat">
                            <div class="token-stat-label">进度</div>
                            <div class="token-stat-value">${(parseFloat(token.progress||0)).toFixed(2)}%</div>
                        </div>
                    </div>
                    <div class="meme-contract" onclick="navigator.clipboard.writeText('${token.contractAddress}');this.textContent='✅ 已复制!';setTimeout(()=>this.textContent='📋 '+this.dataset.addr,1500);" data-addr="${token.contractAddress}">
                        📋 ${token.contractAddress}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
