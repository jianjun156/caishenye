<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Meme Rush 热点监控 - 财神爷养成日记</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css">
    <style>
        .chain-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .chain-btn {
            padding: 10px 20px;
            background: rgba(139, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            color: #ffaa00;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .chain-btn:hover,
        .chain-btn.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
            color: #ffd700;
            transform: translateY(-2px);
        }
        
        .meme-card {
            background: linear-gradient(135deg, rgba(74, 0, 0, 0.8), rgba(26, 0, 0, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .meme-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        .meme-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .meme-symbol {
            font-size: 1.4em;
            font-weight: bold;
            color: #ffd700;
        }
        
        .meme-change {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .meme-change.positive {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .meme-change.negative {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        .meme-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .meme-stat {
            background: rgba(255, 215, 0, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .meme-stat-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 4px;
        }
        
        .meme-stat-value {
            font-size: 0.95em;
            color: #ffd700;
            font-weight: 600;
        }
        
        .meme-contract {
            background: rgba(0,0,0,0.3);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            color: #888;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .meme-contract:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }
        
        .loading-container {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner-large {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-container {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }
        
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 25px;
            color: #1a0000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }
        
        .last-update {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
        
        @media (max-width: 768px) {
            .chain-selector {
                flex-wrap: wrap;
            }
            
            .meme-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .meme-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="mascot">🚀</div>
            <h1>Meme Rush 热点监控</h1>
            <p class="subtitle">动态调用 Binance Web3 Meme Rush API，实时捕捉金狗机会</p>
            <span class="status">🟢 实时监控中</span>
        </header>

        <div class="chain-selector">
            <button class="chain-btn active" data-chain="56">🟡 BSC</button>
            <button class="chain-btn" data-chain="CT_501">🟣 Solana</button>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-category="10">🔥 最新 (New)</button>
            <button class="category-tab" data-category="20">📈 上升 (Finalizing)</button>
            <button class="category-tab" data-category="30">🚀 病毒 (Migrated)</button>
        </div>

        <div id="meme-container">
            <div class="loading-container">
                <div class="loading-spinner-large"></div>
                <p>正在加载 Meme Rush 数据...</p>
            </div>
        </div>

        <div class="last-update" id="last-update"></div>

        <footer>
            <p>🚀 财神爷 | 职业 Meme 土狗交易专家 | 随时准备捕捉下一个 100x</p>
            <p>
                <a href="index.html">🏠 返回首页</a> |
                <a href="https://github.com/jianjun156/caishenye" target="_blank">📁 GitHub</a>
            </p>
        </footer>
    </div>

    <script>
        // API 配置 - Binance Web3 Meme Rush API
        const API_BASE = 'https://web3.binance.com/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/pulse/rank/list';
        let currentChain = '56'; // 默认 BSC
        let currentCategory = 10; // 默认最新 (New)
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            setupChainSelector();
            setupCategoryTabs();
            loadMemeRush(currentChain, currentCategory);
        });
        
        // 设置链选择器
        function setupChainSelector() {
            const buttons = document.querySelectorAll('.chain-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    loadMemeRush(currentChain, currentCategory);
                });
            });
        }
        
        // 设置类目标签
        function setupCategoryTabs() {
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = parseInt(tab.dataset.category);
                    loadMemeRush(currentChain, currentCategory);
                });
            });
        }
        
        // 加载 Meme Rush 数据
        async function loadMemeRush(chainId, rankType) {
            const container = document.getElementById('meme-container');
            const categoryNames = {
                10: '🔥 最新 (New)',
                20: '📈 上升 (Finalizing)',
                30: '🚀 病毒 (Migrated)'
            };
            
            container.innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner-large"></div>
                    <p>正在加载 ${categoryNames[rankType]} 数据...</p>
                </div>
            `;
            
            try {
                // 调用 Binance Web3 Meme Rush API
                const url = `${API_BASE}?chainId=${chainId}&rankType=${rankType}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Accept-Language': 'zh-CN'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.code !== '000000') {
                    throw new Error(result.message || 'API返回错误');
                }
                
                const data = result.data;
                
                if (!data.rank || data.rank.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>📭 暂无${categoryNames[rankType]}数据</h3>
                            <p>该类目下暂时没有热点话题</p>
                        </div>
                    `;
                    return;
                }
                
                renderMemeRush(data.rank, rankType);
                
                // 更新最后更新时间
                document.getElementById('last-update').textContent = 
                    `最后更新: ${new Date().toLocaleString('zh-CN')}`;
                
            } catch (error) {
                console.error('加载 Meme Rush 数据失败:', error);
                container.innerHTML = `
                    <div class="error-container">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>${error.message}</p>
                        <p>可能是网络问题或API暂时不可用</p>
                        <button class="retry-btn" onclick="loadMemeRush('${chainId}', ${rankType})">🔄 重新加载</button>
                    </div>
                `;
            }
        }
        
        // 渲染 Meme Rush 数据
        function renderMemeRush(topics, rankType) {
            const container = document.getElementById('meme-container');
            const categoryNames = {
                10: '🔥 最新',
                20: '📈 上升',
                30: '🚀 病毒'
            };
            
            container.innerHTML = topics.map((topic, index) => {
                const name = topic.name?.topicNameCn || topic.name?.topicNameEn || '未知话题';
                const netInflow = parseFloat(topic.topicNetInflow || 0);
                const tokenCount = topic.tokenSize || 0;
                const progress = parseFloat(topic.progress || 0);
                
                // 获取前3个代币
                const topTokens = (topic.tokenList || []).slice(0, 3);
                
                return `
                    <div class="hotspot-card" style="animation-delay: ${index * 0.1}s">
                        <div class="hotspot-header">
                            <div class="hotspot-title">
                                <span class="hotspot-icon">${categoryNames[rankType] || '🔥'}</span>
                                <h3>${name}</h3>
                            </div>
                            <div class="hotspot-badges">
                                <span class="badge badge-hot">${tokenCount} 代币</span>
                                <span class="badge badge-update">💰 $${(netInflow/1000).toFixed(2)}K</span>
                                <span class="badge" style="background: rgba(155, 89, 182, 0.2); color: #9b59b6; border-color: rgba(155, 89, 182, 0.3);">进度 ${progress.toFixed(1)}%</span>
                            </div>
                        </div>
                        
                        ${topic.aiSummary?.aiSummaryCn ? `
                            <div class="hotspot-summary">
                                <p>🤖 ${topic.aiSummary.aiSummaryCn}</p>
                            </div>
                        ` : ''}
                        
                        <div class="token-list">
                            <h4>🏷️ 关联代币 (${topTokens.length})</h4>
                            ${topTokens.length > 0 ? topTokens.map(token => `
                                <div class="token-item">
                                    <div class="token-info">
                                        <span class="token-symbol">${token.symbol}</span>
                                        <span class="token-price">市值: $${parseFloat(token.marketCap || 0).toFixed(2)}</span>
                                        <span class="token-contract" title="点击复制合约地址">📋 ${token.contractAddress}</span>
                                    </div>
                                    <div class="token-stats">
                                        <span class="token-change ${parseFloat(token.priceChange24h || 0) >= 0 ? 'positive' : 'negative'}">
                                            ${parseFloat(token.priceChange24h || 0) >= 0 ? '+' : ''}${parseFloat(token.priceChange24h || 0).toFixed(2)}%
                                        </span>
                                        <span class="token-holders">👥 ${token.holders || 0}</span>
                                    </div>
                                </div>
                            `).join('') : '<p class="no-tokens">暂无代币数据</p>'}
                        </div>
                        
                        ${topic.topicLink ? `
                            <div class="hotspot-footer">
                                <a href="${topic.topicLink}" target="_blank" class="topic-link">
                                    🔗 查看原文 <span class="arrow">→</span>
                                </a>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // 添加点击复制合约地址功能
            document.querySelectorAll('.token-contract').forEach(el => {
                el.style.cursor = 'pointer';
                el.addEventListener('click', function() {
                    const address = this.textContent.replace('📋 ', '');
                    navigator.clipboard.writeText(address).then(() => {
                        const original = this.textContent;
                        this.textContent = '✅ 已复制!';
                        setTimeout(() => {
                            this.textContent = original;
                        }, 1500);
                    });
                });
            });
        }
    </script>
</body>
</html>
