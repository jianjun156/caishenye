<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Meme Rush 热点监控 - 财神爷养成日记</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css?v=202603051745">
    <style>
        .chain-selector, .category-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .chain-btn, .category-tab {
            padding: 10px 20px;
            background: rgba(139, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            color: #ffaa00;
            cursor: pointer;
            font-weight: 600;
        }
        .chain-btn.active, .category-tab.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
            color: #ffd700;
        }
        .loading-container { text-align: center; padding: 60px 20px; }
        .error-container { text-align: center; padding: 60px 20px; color: #e74c3c; }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 25px;
            color: #1a0000;
            font-weight: 600;
            cursor: pointer;
        }
        .hotspot-card {
            background: linear-gradient(135deg, rgba(74, 0, 0, 0.8), rgba(26, 0, 0, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .hotspot-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .hotspot-title h3 {
            color: #ffd700;
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }
        .hotspot-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
            background: rgba(255, 215, 0, 0.2);
            color: #ffaa00;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .hotspot-summary {
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid #ffd700;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }
        .hotspot-summary p {
            color: #ffaa00;
            margin: 0;
            line-height: 1.6;
            font-size: 0.9em;
        }
        .token-list h4 {
            color: #ffd700;
            margin: 15px 0 10px;
            font-size: 1em;
        }
        .token-item {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .token-symbol {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1em;
        }
        .token-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .token-stat {
            font-size: 0.8em;
            color: #888;
        }
        .token-stat-value {
            color: #ffd700;
            font-weight: 600;
            margin-top: 2px;
        }
        .meme-contract {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75em;
            color: #888;
            cursor: pointer;
            word-break: break-all;
            margin-top: 8px;
        }
        .meme-contract:hover { background: rgba(255, 215, 0, 0.1); color: #ffd700; }
        .last-update { text-align: center; color: #888; margin-top: 30px; }
        .data-info {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffaa00;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="mascot">🚀</div>
            <h1>Meme Rush 热点监控</h1>
            <p class="subtitle">Binance Web3 Topic Rush - 热点话题追踪</p>
            <span class="status">🟢 实时监控中</span>
        </header>

        <div class="data-info" id="data-info">📊 加载中...</div>

        <div class="chain-selector">
            <button class="chain-btn active" data-chain="bsc">🟡 BSC</button>
            <button class="chain-btn" data-chain="solana">🟣 Solana</button>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-category="latest">🔥 最新</button>
            <button class="category-tab" data-category="rising">📈 上升</button>
            <button class="category-tab" data-category="viral">🚀 病毒</button>
        </div>

        <div id="meme-container">
            <div class="loading-container">
                <p>🔄 正在加载数据...</p>
            </div>
        </div>

        <div class="last-update" id="last-update"></div>

        <footer>
            <p><a href="index.html">🏠 返回首页</a> | <a href="https://github.com/jianjun156/caishenye" target="_blank">📁 GitHub</a></p>
        </footer>
    </div>

    <script>
        let memeData = {};
        let currentChain = 'bsc';
        let currentCategory = 'latest';
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadMemeData();
            setupChainSelector();
            setupCategoryTabs();
            renderMemeRush();
        });
        
        async function loadMemeData() {
            try {
                const githubUrl = 'https://raw.githubusercontent.com/jianjun156/caishenye/main/meme-rush-data.json';
                const response = await fetch(githubUrl + '?t=' + Date.now());
                if (!response.ok) throw new Error('数据文件不存在');
                memeData = await response.json();
                updateDataInfo();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('meme-container').innerHTML = `
                    <div class="error-container">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>${error.message}</p>
                        <button class="retry-btn" onclick="location.reload()">🔄 刷新</button>
                    </div>
                `;
            }
        }
        
        function updateDataInfo() {
            const chainData = memeData[currentChain];
            if (!chainData) return;
            
            const total = Object.values(chainData).reduce((sum, cat) => sum + (cat.count || 0), 0);
            const timestamp = chainData.latest?.timestamp || '';
            
            document.getElementById('data-info').textContent = 
                `📊 共 ${total} 个热点话题 | 最后更新：${new Date(timestamp).toLocaleString('zh-CN')}`;
            
            document.getElementById('last-update').textContent = 
                `数据更新时间：${new Date(timestamp).toLocaleString('zh-CN')} (每 15 分钟自动更新)`;
        }
        
        function setupChainSelector() {
            document.querySelectorAll('.chain-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentChain = btn.dataset.chain;
                    updateDataInfo();
                    renderMemeRush();
                });
            });
        }
        
        function setupCategoryTabs() {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    renderMemeRush();
                });
            });
        }
        
        function renderMemeRush() {
            const container = document.getElementById('meme-container');
            const categoryNames = {latest: '🔥 最新', rising: '📈 上升', viral: '🚀 病毒'};
            
            const chainData = memeData[currentChain];
            if (!chainData) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3></div>';
                return;
            }
            
            const categoryData = chainData[currentCategory];
            const topics = categoryData?.data || [];
            
            if (!topics || topics.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 暂无数据</h3><p>该类目下暂时没有热点话题</p></div>';
                return;
            }
            
            container.innerHTML = topics.map((topic, i) => {
                const name = topic.name?.topicNameCn || topic.name?.topicNameEn || '未知话题';
                const netInflow = parseFloat(topic.topicNetInflow || 0);
                const tokenCount = topic.tokenSize || 0;
                const progress = parseFloat(topic.progress || 0);
                const type = topic.type || 'Unknown';
                const tokens = topic.tokenList || [];
                
                return `
                    <div class="hotspot-card">
                        <div class="hotspot-header">
                            <div class="hotspot-title">
                                <h3>${name}</h3>
                                <div style="color:#888;font-size:0.85em;margin-top:5px;">📊 类型：${type}</div>
                            </div>
                            <div class="hotspot-badges">
                                <span class="badge">🔥 ${tokenCount} 代币</span>
                                <span class="badge">💰 $${(netInflow/1000).toFixed(2)}K</span>
                                <span class="badge">📈 进度 ${progress.toFixed(1)}%</span>
                            </div>
                        </div>
                        
                        ${topic.aiSummary?.aiSummaryCn ? `
                            <div class="hotspot-summary">
                                <p>🤖 ${topic.aiSummary.aiSummaryCn}</p>
                            </div>
                        ` : ''}
                        
                        ${tokens.length > 0 ? `
                            <div class="token-list">
                                <h4>🏷️ 关联代币 (${tokens.length})</h4>
                                ${tokens.slice(0, 5).map(token => `
                                    <div class="token-item">
                                        <div class="token-symbol">${token.symbol}</div>
                                        <div class="token-stats">
                                            <div class="token-stat">
                                                <div>市值</div>
                                                <div class="token-stat-value">$${(parseFloat(token.marketCap||0)/1000).toFixed(2)}K</div>
                                            </div>
                                            <div class="token-stat">
                                                <div>流动性</div>
                                                <div class="token-stat-value">$${(parseFloat(token.liquidity||0)/1000).toFixed(2)}K</div>
                                            </div>
                                            <div class="token-stat">
                                                <div>24h 涨跌</div>
                                                <div class="token-stat-value" style="color: ${parseFloat(token.priceChange24h||0) >= 0 ? '#2ecc71' : '#e74c3c'}">
                                                    ${parseFloat(token.priceChange24h||0) >= 0 ? '+' : ''}${parseFloat(token.priceChange24h||0).toFixed(2)}%
                                                </div>
                                            </div>
                                            <div class="token-stat">
                                                <div>持有者</div>
                                                <div class="token-stat-value">👥 ${token.holders||0}</div>
                                            </div>
                                        </div>
                                        <div class="meme-contract" onclick="navigator.clipboard.writeText('${token.contractAddress}');this.textContent='✅ 已复制!';setTimeout(()=>this.textContent='📋 '+this.dataset.addr,1500);" data-addr="${token.contractAddress}">
                                            📋 ${token.contractAddress}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        ${topic.topicLink ? `
                            <div style="margin-top:15px;">
                                <a href="${topic.topicLink}" target="_blank" style="color:#ffd700;text-decoration:none;font-size:0.9em;">
                                    🔗 查看原文 →
                                </a>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
